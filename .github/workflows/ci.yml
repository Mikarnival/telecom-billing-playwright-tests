name: Playwright Pytest CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Run API and UI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install --with-deps chromium

      - name: Start backend
        run: |
          uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for backend
        run: |
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:8000/health

      - name: Start frontend
        run: |
          python -m http.server 3000 --directory app/frontend &

      - name: Wait for frontend
        run: |
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000

      - name: Run tests
        run: |
          pytest -v \
            --junitxml=test-results/pytest-results.xml \
            --tracing=retain-on-failure \
            --screenshot=only-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore