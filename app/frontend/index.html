<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Telecom Billing Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 32px;
        color: #1f2937;
        background: #f9fafb;
      }

      main {
        max-width: 960px;
      }

      h1 {
        margin-bottom: 8px;
      }

      h2 {
        margin-top: 40px;
        margin-bottom: 16px;
      }

      .subtitle {
        color: #6b7280;
        margin-bottom: 24px;
      }

      .controls {
        display: flex;
        gap: 16px;
        align-items: end;
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      input,
      select {
        border: 1px solid #9ca3af;
        border-radius: 4px;
        padding: 8px;
        width: 260px;
        background: white;
      }

      button {
        border: 1px solid #1f2937;
        border-radius: 4px;
        padding: 8px 12px;
        background: #1f2937;
        color: white;
        cursor: pointer;
      }

      button:disabled {
        background: #9ca3af;
        border-color: #9ca3af;
        cursor: not-allowed;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        background: white;
      }

      th,
      td {
        border-bottom: 1px solid #e5e7eb;
        padding: 12px;
        text-align: left;
      }

      th {
        background: #f3f4f6;
      }

      .status {
        border-radius: 4px;
        padding: 4px 8px;
        font-weight: 700;
      }

      .Paid {
        background: #dcfce7;
        color: #166534;
      }

      .Unpaid {
        background: #fee2e2;
        color: #991b1b;
      }

      .Overdue {
        background: #ffedd5;
        color: #9a3412;
      }

      .Active {
        background: #dcfce7;
        color: #166534;
      }

      .Draft {
        background: #dbeafe;
        color: #1e40af;
      }

      .message {
        margin-top: 16px;
        font-weight: 700;
      }

      .error {
        color: #991b1b;
      }

      .success {
        color: #166534;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Telecom Billing Dashboard</h1>
      <p class="subtitle">
        Mini test application for Playwright UI and API testing.
      </p>

      <section class="controls" aria-label="Invoice filters">
        <div>
          <label for="customer-search">Search customer or invoice</label>
          <input
            id="customer-search"
            placeholder="Customer name, customer id, or invoice id"
          />
        </div>

        <div>
          <label for="status-filter">Invoice status</label>
          <select id="status-filter">
            <option value="">All</option>
            <option value="Paid">Paid</option>
            <option value="Unpaid">Unpaid</option>
            <option value="Overdue">Overdue</option>
          </select>
        </div>

        <button id="refresh-button" type="button">Refresh</button>
      </section>

      <table aria-label="Invoices">
        <thead>
          <tr>
            <th>Invoice</th>
            <th>Customer ID</th>
            <th>Customer Name</th>
            <th>Contract</th>
            <th>Plan</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="invoice-table-body"></tbody>
      </table>

      <p id="message" class="message" role="status"></p>

      <section aria-labelledby="customer-contract-heading">
        <h2 id="customer-contract-heading">Customer & Contract Lifecycle</h2>

        <section class="controls" aria-label="Customer search">
          <div>
            <label for="lifecycle-customer-search">Search customer</label>
            <input
              id="lifecycle-customer-search"
              placeholder="Customer id"
            />
          </div>
        </section>

        <table aria-label="Customers">
          <thead>
            <tr>
              <th>Customer ID</th>
              <th>Name</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="customer-table-body">
            <tr>
              <td colspan="4">No customer found</td>
            </tr>
          </tbody>
        </table>

        <table aria-label="Contracts">
          <thead>
            <tr>
              <th>Contract ID</th>
              <th>Plan</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="contract-table-body"></tbody>
        </table>

        <p id="customer-contract-message" class="message" role="status"></p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
